name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - run: mkdir -p ~/.android && keytool -genkey -v -keystore ~/.android/debug.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias androiddebugkey -storepass android -keypass android -dname "CN=Debug"

      - run: ./gradlew assembleRelease

      - run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/suma-reader.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/suma-reader.apk
